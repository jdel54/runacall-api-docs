<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run a Call External API</title>
    <meta
      name="description"
      content="Bearer-authenticated REST API for pushing data into and pulling data out of Run a Call. CRUD on customers, properties, equipment, jobs, memberships. Read-only on estimates, invoices, payments, voice calls, pricebook, communications. HMAC-signed webhooks for 14 canonical events."
    />
    <!-- noindex while the public-API marketing posture is still TBD. Flip to
         index,follow (or just remove this line) once the Phase 4 GTM push is
         green-lit. Currently the docs are intentionally only reachable for
         users we point at them via in-app links + onboarding emails. -->
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .docs-actions {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 100;
        display: flex;
        gap: 8px;
      }
      .docs-actions a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #0f0f0f;
        color: #fff;
        font-family: Roboto, system-ui, sans-serif;
        font-size: 12.5px;
        font-weight: 500;
        text-decoration: none;
        border-radius: 6px;
        transition: background 120ms ease;
      }
      .docs-actions a:hover {
        background: #2a2a2a;
      }
      .docs-actions a.secondary {
        background: #fff;
        color: #0f0f0f;
        border: 1px solid #e5e5e5;
      }
      .docs-actions a.secondary:hover {
        background: #f5f5f5;
      }
      @media (max-width: 720px) {
        .docs-actions {
          position: static;
          padding: 12px 16px;
          background: #fafafa;
          border-bottom: 1px solid #e5e5e5;
        }
      }
    </style>
  </head>
  <body>
    <div class="docs-actions">
      <a href="openapi.json" download="runacall-openapi.json" class="secondary">
        Download OpenAPI
      </a>
      <a href="postman-collection.json" download="runacall-api.postman_collection.json">
        Import into Postman
      </a>
    </div>
    <redoc
      spec-url="./openapi.json"
      hide-loading
      expand-responses="200,201"
      expand-single-schema-field="true"
      hide-download-button="false"
      sort-tags-alphabetically="false"
      path-in-middle-panel
      json-sample-expand-level="3"
      schema-expansion-level="1"
      theme='{
        "colors": {
          "primary": {"main": "#0f0f0f"},
          "success": {"main": "#10b981"},
          "warning": {"main": "#f59e0b"},
          "error": {"main": "#ef4444"},
          "text": {"primary": "#0f0f0f", "secondary": "#52525b"},
          "border": {"dark": "#e4e4e7", "light": "#f4f4f5"},
          "http": {"get": "#10b981", "post": "#3b82f6", "patch": "#f59e0b", "delete": "#ef4444"}
        },
        "typography": {
          "fontSize": "14.5px",
          "lineHeight": "1.55",
          "fontFamily": "-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif",
          "headings": {"fontFamily": "-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif", "fontWeight": "600"},
          "code": {"fontFamily": "ui-monospace, SFMono-Regular, Menlo, monospace", "fontSize": "13px"}
        },
        "sidebar": {
          "backgroundColor": "#fafafa",
          "textColor": "#27272a",
          "width": "280px"
        },
        "rightPanel": {
          "backgroundColor": "#0f0f0f",
          "textColor": "#fafafa",
          "width": "40%"
        },
        "codeBlock": {"backgroundColor": "#18181b"},
        "schema": {"nestedBackground": "#fafafa"}
      }'
    ></redoc>
    <script src="https://cdn.redocly.com/redoc/latest/bundles/redoc.standalone.js"></script>
  </body>
</html>
