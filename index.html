<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run a Call External API</title>
    <meta
      name="description"
      content="Bearer-authenticated REST API for pushing data into and pulling data out of Run a Call. CRUD on customers, properties, equipment, jobs, memberships. Read-only on estimates, invoices, payments, voice calls, pricebook, communications. HMAC-signed webhooks for 14 canonical events."
    />
    <!-- noindex while the public-API marketing posture is still TBD. -->
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@stoplight/elements/styles.min.css"
    />
    <style>
      body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
      .docs-actions {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 1000;
        display: flex;
        gap: 8px;
      }
      .docs-actions a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #0f0f0f;
        color: #fff;
        font-size: 12.5px;
        font-weight: 500;
        text-decoration: none;
        border-radius: 6px;
        transition: background 120ms ease;
      }
      .docs-actions a:hover { background: #2a2a2a; }
      .docs-actions a.secondary {
        background: #fff;
        color: #0f0f0f;
        border: 1px solid #e5e5e5;
      }
      .docs-actions a.secondary:hover { background: #f5f5f5; }
    </style>
  </head>
  <body>
    <div class="docs-actions">
      <a href="openapi.json" download="runacall-openapi.json" class="secondary">
        Download OpenAPI
      </a>
      <a href="postman-collection.json" download="runacall-api.postman_collection.json">
        Import into Postman
      </a>
    </div>
    <elements-api
      apiDescriptionUrl="openapi.json"
      router="hash"
      layout="sidebar"
      tryItCredentialsPolicy="same-origin"
      hideInternal="true"
    ></elements-api>
    <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
  </body>
</html>
